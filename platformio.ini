; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = anchor

[env]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
board_build.arduino.memory_type = qio_qspi
board_build.flash_mode = qio
board_build.psram_type = qio
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216
board_build.partitions = default_16MB.csv
lib_deps = marzogh/SPIMemory@^3.4.0
		marzogh/SPIMemory@^3.4.0
build_flags = 
	-DBOARD_HAS_PSRAM
	-D ARDUINO_USB_CDC_ON_BOOT=1
	;en modo tag limita anchors conocidos
    ;en modo ancla limita tags conocidos
	-D MAX_DEVICES=10									; Debe ser el máximo entre anchors y tags simultáneos
	-D DW1000_NETWORK_ID=0xDECA
	-D DW1000_TAG_TIMER_JITTER_MS=25
	-D DW1000_TAG_TX_PERIOD_S=16						;Tiempo entre transmisiones
	-D DW1000_TAG_TDMA_SLOT_MS=1000						;Tiempo de cada slot TDMA, debe ser mayor que el tiempo de transmisión + tiempo de respuesta + jitter	
	-D DW1000_TAG_TDMA_SLOT_COUNT=4						;Equivalente al número maximo de tags
	-D DW1000_TAG_RESPONSE_SLOT_COUNT=4					;Número de slots de respuesta en cada ronda de ranging. Equivalente al número máximo de tags simultáneos
	-D UWB_DEVICE_INACTIVITY_TIME_MS=40000
	-D DW1000_TAG_POWER_SAVE_MODE=1
	-D DW1000_SYNC_PERIOD_MS=5000
	-D DW1000_SYNC_TIMEOUT_MS=10000
	-D DW1000_TAG_BURST_WARMUP_POLLS=1
	-D DW1000_TAG_BURST_RANGING_ROUNDS=4
	-D DW1000_TAG_BURST_ROUND_GAP_MS=25					; Gap entre rondas de ranging en burst (para evitar colisiones acumulativas)
	-D DW1000_TAG_ACTIVE_GUARD_MS=50					; Tiempo extra para evitar colisiones con tags que se están quedando dormidos	
	-D DW1000_TAG_BURST_BLINK_WAIT_MS=35				; Preamble 4096, 4 anclas: (4-1)×7ms+6ms_airtime+2ms_margen=30ms | 8 anclas→58ms
	-D DW1000_AUTO_TIMING=0								; Calcula automáticamente los tiempos de respuesta basándose en el número de anchors y tags, y la duración de cada slot TDMA. Si se activa, se ignoran los valores de DW1000_ANCHOR_RANGING_INIT_SLOT_US, DW1000_ANCHOR_POLL_ACK_BASE_DELAY_US y DW1000_ANCHOR_RANGE_REPORT_BASE_DELAY_US
	-D DW1000_AUTO_TIMING_MAX_ANCHORS=5
	-D DW1000_AUTO_TIMING_MAX_TAGS=8
	; -D DW1000_TAG_RESPONSE_SLOT_US=11000				; Preamble 4096, 4 anclas: RANGE_airtime(9+2+4×17=79B)=10125µs → 11000µs (≥airtime para que RANGEs de TAGs distintos no colisionen)
	; -D DW1000_ANCHOR_RANGING_INIT_SLOT_US=7000			; Preamble 4096: slot≥RANGING_INIT_airtime(5964µs)+proc(400µs)=6364µs → 7000µs
	; -D DW1000_ANCHOR_POLL_ACK_BASE_DELAY_US=3000		; Preamble 4096: 2×base≥POLL_ACK_airtime(5234µs)+proc(400µs)=5634µs → base≥2817 → 3000µs
	; -D DW1000_ANCHOR_RANGE_REPORT_BASE_DELAY_US=3500	; Preamble 4096: 2×base≥RANGE_REPORT_airtime(5818µs)+proc(400µs)=6218µs → base≥3109 → 3500µs
	-D DW1000_ANCHOR_RANGING_INIT_SLOT_US=7000			; Preamble 4096: slot≥RANGING_INIT_airtime(5964µs)+proc(400µs)=6364µs → 7000µs
	-D DW1000_ANCHOR_POLL_ACK_BASE_DELAY_US=6000		; Preamble 4096: 2×base≥POLL_ACK_airtime(5234µs)+proc(400µs)=5634µs → base≥2817 → 3000µs
	-D DW1000_ANCHOR_RANGE_REPORT_BASE_DELAY_US=3500	; Preamble 4096: 2×base≥RANGE_REPORT_airtime(5818µs)+proc(400µs)=6218µs → base≥3109 → 3500µs
	-D DEBUG=false
	-D UWB_CPU_WATCHDOG_TIMEOUT_MS=120000				; Sin remotos por 60s → TWDT expira y reinicia el ESP32 completo
	-D DEFAULT_REPLY_DELAY_TIME=3000					; Fallback = DW1000_ANCHOR_POLL_ACK_BASE_DELAY_US (preamble 4096)
	-D ESPNOW_BROADCAST_INTERVAL_MS=20000				; Intervalo entre transmisiones de credentials por ESPNOW (solo para anchor master)
	-D DW1000_USB_CONTINUOUS_MODE=1						; Modo continuo para debug por USB (desactiva sleep y watchdogs, y muestra más logs)
	-D DW1000_CONTINUOUS_POST_MODE=1
	-D DW1000_CHANNEL=2									; Canal de radio UWB (1, 2, 3 o 5)
	-D SENSOR_PREFIX=\"BETA\"							; Prefijo para identificar anchors en los logs
monitor_speed = 115200
; upload_port = COM13  ; Ejemplo para Windows
; monitor_port = COM13 ; Ejemplo para Windows

upload_port = COM13  ; Ejemplo para Windows
monitor_port = COM13 ; Ejemplo para Windows


[env:anchor]
build_flags = 
	${env.build_flags}
	-D UWB_ROLE_ANCHOR=1
	-D UWB_ADDRESS=\"AA:BB:12:41:FF:FF:FF:03\"
	-D DW1000_ANCHOR_MASTER_ENABLED=0
	-D DW1000_TAG_REQUIRE_SYNC=0
	-D UWB_ANTENNA_DELAY=16477  ; Valor específico para cada ancla, calibrado para que las distancias medidas sean correctas
lib_deps = bblanchon/ArduinoJson@^7.2.2
    		marzogh/SPIMemory@^3.4.0

[env:anchor_master]
build_flags = 
	${env.build_flags}
	-D UWB_ROLE_ANCHOR=1
	-D UWB_ADDRESS=\"AA:AA:12:41:FF:FF:FF:00\"
	-D DW1000_ANCHOR_MASTER_ENABLED=1
	-D DW1000_TAG_REQUIRE_SYNC=1
	-D UWB_ANTENNA_DELAY=16485 ; Valor específico para cada ancla, calibrado para que las distancias medidas sean correctas
lib_deps = bblanchon/ArduinoJson@^7.2.2
			marzogh/SPIMemory@^3.4.0

	; Beta
; Anchor0  	16485	
; Anchor1 	16495
; Anchor2 	16475
; Anchor3  	16477 