; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = anchor

[env]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
board_build.arduino.memory_type = qio_qspi
board_build.flash_mode = qio
board_build.psram_type = qio
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216
board_build.partitions = default_16MB.csv
lib_deps = marzogh/SPIMemory@^3.4.0
		marzogh/SPIMemory@^3.4.0
build_flags = 
	-DBOARD_HAS_PSRAM
	-D ARDUINO_USB_CDC_ON_BOOT=1
	;en modo tag limita anchors conocidos
    ;en modo ancla limita tags conocidos
	-D MAX_DEVICES=4									; Debe ser el máximo entre anchors y tags simultáneos
	-D DW1000_NETWORK_ID=0xDECA
	-D DW1000_TAG_TIMER_JITTER_MS=25
	-D DW1000_TAG_TX_PERIOD_S=16						;Tiempo entre transmisiones
	-D DW1000_TAG_TDMA_SLOT_MS=1000						;Tiempo de cada slot TDMA, debe ser mayor que el tiempo de transmisión + tiempo de respuesta + jitter	
	-D DW1000_TAG_TDMA_SLOT_COUNT=4						;Equivalente al número maximo de tags
	-D DW1000_TAG_RESPONSE_SLOT_COUNT=4			;Número de slots de respuesta en cada ronda de ranging. Debe ser mayor o igual que el número máximo de anchors para evitar colisiones
	-D DW1000_TAG_RESPONSE_SLOT_US=1500					
	-D UWB_DEVICE_INACTIVITY_TIME_MS=40000
	-D DW1000_TAG_POWER_SAVE_MODE=1
	-D DW1000_SYNC_PERIOD_MS=5000
	-D DW1000_SYNC_TIMEOUT_MS=10000
	-D DW1000_TAG_BURST_WARMUP_POLLS=1
	-D DW1000_TAG_BURST_RANGING_ROUNDS=4
	-D DW1000_TAG_BURST_ROUND_GAP_MS=25					; Gap entre rondas de ranging en burst (para evitar colisiones acumulativas)
	-D DW1000_TAG_ACTIVE_GUARD_MS=50					; Tiempo extra para evitar colisiones con tags que se están quedando dormidos	
	-D DW1000_TAG_BURST_BLINK_WAIT_MS=40				; Tiempo de espera después del BLINK antes de empezar la ronda de ranging en burst Variable según el número de anchors para evitar colisiones acumulativas
	-D DW1000_AUTO_TIMING=0								; Calcula automáticamente los tiempos de respuesta basándose en el número de anchors y tags, y la duración de cada slot TDMA. Si se activa, se ignoran los valores de DW1000_ANCHOR_RANGING_INIT_SLOT_US, DW1000_ANCHOR_POLL_ACK_BASE_DELAY_US y DW1000_ANCHOR_RANGE_REPORT_BASE_DELAY_US
	-D DW1000_AUTO_TIMING_MAX_ANCHORS=5
	-D DW1000_AUTO_TIMING_MAX_TAGS=8
	-D DW1000_ANCHOR_RANGING_INIT_SLOT_US=5000			; Separación entre respuestas RANGING_INIT de las anclas
	-D DW1000_ANCHOR_POLL_ACK_BASE_DELAY_US=5000		; Base para POLL_ACK: ancla i responde en (2*i+1)*base
	-D DW1000_ANCHOR_RANGE_REPORT_BASE_DELAY_US=6000	; Base para RANGE_REPORT: un poco mayor por la carga útil
	-D DEBUG=false
	
	-D DEFAULT_REPLY_DELAY_TIME=5000					; Fallback/compatibilidad hacia atrás
monitor_speed = 115200
upload_port = COM8  ; Ejemplo para Windows
monitor_port = COM8  ; Ejemplo para Windows


[env:tag]
build_flags = 
	${env.build_flags}
	-D UWB_ROLE_ANCHOR=0
	-D UWB_ADDRESS=\"BB:BB:12:41:FF:FF:00:01\"
	-D DW1000_ANCHOR_MASTER_ENABLED=0
	-D DW1000_TAG_REQUIRE_SYNC=0
lib_deps = bblanchon/ArduinoJson@^7.2.2
      marzogh/SPIMemory@^3.4.0

[env:anchor]
build_flags = 
	${env.build_flags}
	-D UWB_ROLE_ANCHOR=1
	-D UWB_ADDRESS=\"AA:BB:12:41:FF:FF:FF:A2\"
	-D DW1000_ANCHOR_MASTER_ENABLED=0
	-D DW1000_TAG_REQUIRE_SYNC=0
lib_deps = bblanchon/ArduinoJson@^7.2.2
    		marzogh/SPIMemory@^3.4.0

[env:anchor_master]
build_flags = 
	${env.build_flags}
	-D UWB_ROLE_ANCHOR=1
	-D UWB_ADDRESS=\"AA:AA:12:41:FF:FF:FF:A0\"
	-D DW1000_ANCHOR_MASTER_ENABLED=1
	-D DW1000_TAG_REQUIRE_SYNC=1
lib_deps = bblanchon/ArduinoJson@^7.2.2
			marzogh/SPIMemory@^3.4.0

